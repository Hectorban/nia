name: Build and Release
on:
  push:
    tags: ['v*']

jobs:
  build-windows:
    name: Windows (MSI)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles msi

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: nia-windows-msi
          path: ${{ steps.build.outputs.artifact-path }}
          if-no-files-found: error

  build-linux:
    name: Linux (AppImage + deb)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles deb,appimage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nia-linux
          path: ${{ steps.build.outputs.artifact-path }}
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NIA ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
            
            ## Downloads
            - **Windows**: `nia_${{ github.ref_name }}_x64.msi` (MSI installer)
            - **Linux**: `nia_${{ github.ref_name }}_amd64.AppImage` and `nia_${{ github.ref_name }}_amd64.deb`
            
            See the [README](https://github.com/${{ github.repository }}) for setup instructions.
          draft: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}